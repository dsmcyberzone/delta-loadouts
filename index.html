<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Force Loadouts</title>
    <style>
        :root {
            --bg-color: #0d131a; 
            --card-bg: #141d26;
            --text-color: #ffffff;
            --accent-color: #00f0ff; 
            --gold-color: #ffd700;   
            --border-color: #1e2b38;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 50px; }

        header {
            text-align: center;
            padding: 60px 20px 30px 20px;
            background: linear-gradient(180deg, #172330 0%, var(--bg-color) 100%);
            border-bottom: 1px solid var(--border-color);
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .sub-title {
            font-size: 1.4rem;
            font-weight: normal;
            color: #94a3b8;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.4;
        }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

        .weapon-group {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .weapon-group:hover {
            border-color: var(--accent-color);
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.1);
        }

        .weapon-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .weapon-header:hover { background-color: #1a2632; }
        .weapon-header.active { border-bottom: 1px solid var(--border-color); background-color: #1a2632; }

        .weapon-title { font-size: 1.6rem; font-weight: bold; color: var(--gold-color); letter-spacing: 1px; }
        .arrow { transition: transform 0.3s; font-size: 1.2rem; color: var(--accent-color); }
        .weapon-header.active .arrow { transform: rotate(180deg); }

        .loadout-list { display: none; padding: 10px 20px; background-color: #0b1016; }

        .loadout-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #141d26;
            gap: 15px;
        }

        .loadout-item:last-child { border-bottom: none; }
        .loadout-name { color: #cbd5e1; font-size: 1.1rem; font-weight: 500; }

        .copy-btn {
            background-color: var(--accent-color);
            color: #0d131a;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            min-width: 110px;
            transition: 0.2s;
        }

        .copy-btn:hover { background-color: #33f3ff; transform: scale(1.03); }
        .copy-btn.copied { background-color: #22c55e; color: #ffffff; }

        .social-links { text-align: center; margin-top: 40px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        .btn-social {
            display: inline-block;
            width: 100%;
            max-width: 350px;
            color: white;
            text-decoration: none;
            padding: 14px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn-youtube { background-color: #FF0000; }
        .btn-discord { background-color: #5865F2; }
        .btn-social:hover { opacity: 0.9; transform: translateY(-2px); }

        footer { text-align: center; margin-top: 60px; color: #475569; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="main-title">DELTA FORCE LOADOUT</div>
        <div class="sub-title">ඔයාට කැමති Weapon Loadout එකක් මෙතනින් ලේසියෙන් Copy කරගන්න</div>
    </header>

    <div class="container">

        <script>
            // වෙපන්ස් 50 ලේසියෙන් Generate කරගන්න Array එකක් පාවිච්චි කරමු
            const weaponsCount = 50;
            const container = document.currentScript.parentElement;

            // දැනට Sample එකක් විදියට තුවක්කු නම් කිහිපයක් දාන්නම්, පස්සේ ඔයාට ඕන විදියට වෙනස් කරගන්න
            const weaponNames = {
                1: "AK-12", 2: "M4A1", 3: "AS VAL", 4: "SCAR-H", 5: "M16A4",
                6: "AWM", 7: "M24", 8: "MP5", 9: "P90", 10: "UZI"
            };

            for(let i = 1; i <= weaponsCount; i++) {
                //
