<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Force Loadouts</title>
    <style>
        :root {
            --bg-color: #0d131a; 
            --card-bg: #141d26;
            --text-color: #ffffff;
            --accent-color: #00f0ff; 
            --gold-color: #ffd700;   
            --border-color: #1e2b38;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 50px; }

        header {
            text-align: center;
            padding: 50px 20px 25px 20px;
            background: linear-gradient(180deg, #172330 0%, var(--bg-color) 100%);
        }

        .main-title {
            font-size: 3.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .sub-title {
            font-size: 1.3rem;
            font-weight: normal;
            color: #94a3b8;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.4;
        }

        /* Category Filter Menu */
        .category-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .tab-btn {
            background-color: #1a2632;
            color: #cbd5e1;
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .tab-btn:hover, .tab-btn.active {
            background-color: var(--accent-color);
            color: #0d131a;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; }

        .weapon-group {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .weapon-group:hover {
            border-color: var(--accent-color);
        }

        .weapon-header {
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .weapon-header:hover { background-color: #1a2632; }
        .weapon-header.active { border-bottom: 1px solid var(--border-color); background-color: #1a2632; }

        .weapon-title { font-size: 1.5rem; font-weight: bold; color: var(--gold-color); letter-spacing: 1px; }
        .arrow { transition: transform 0.3s; font-size: 1.2rem; color: var(--accent-color); }
        .weapon-header.active .arrow { transform: rotate(180deg); }

        .loadout-list { display: none; padding: 5px 20px; background-color: #0b1016; }

        .loadout-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #141d26;
            gap: 15px;
        }

        .loadout-item:last-child { border-bottom: none; }
        .loadout-name { color: #cbd5e1; font-size: 1.05rem; font-weight: bold; }

        .copy-btn {
            background-color: var(--accent-color);
            color: #0d131a;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            min-width: 105px;
            transition: 0.2s;
        }

        .copy-btn:hover { background-color: #33f3ff; }
        .copy-btn.copied { background-color: #22c55e; color: #ffffff; }

        .social-links { text-align: center; margin-top: 40px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        .btn-social {
            display: inline-block;
            width: 100%;
            max-width: 350px;
            color: white;
            text-decoration: none;
            padding: 14px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn-youtube { background-color: #FF0000; }
        .btn-discord { background-color: #5865F2; }
        .btn-social:hover { opacity: 0.9; transform: translateY(-2px); }

        footer { text-align: center; margin-top: 60px; color: #475569; font-size: 0.9rem; }
    </style>
</head>

            { category: "pistol", title: "G17", builds: ["NO CODE1", "NO CODE2", "NO CODE3", "NO CODE4", "NO CODE5"] },

            { category: "pistol", title: "QSZ-92G", builds: ["NO CODE1", "NO CODE2", "NO CODE3", "NO CODE4", "NO CODE5"] },
            { category: "pistol", title: "93R", builds: ["NO CODE1", "NO CODE2", "NO CODE3", "NO CODE4", "NO CODE5"] },
            { category: "pistol", title: "Desert Eagle", builds: ["NO CODE1", "NO CODE2", "NO CODE3", "NO CODE4", "NO CODE5"] },

        // සයිට් එක ලෝඩ් වෙද්දී වෙපන්ස් ජෙනරේට් කරන ෆන්ක්ෂන් එක
        function generateWeapons() {
            const container = document.getElementById('weapons-container');
            container.innerHTML = '';
            
            weaponDatabase.forEach((weapon, wIdx) => {
                let buildsHtml = '';
                weapon.builds.forEach((build, bIdx) => {
                    // බිල්ඩ් එකේ නම (උදා: NO CODE1) සහ කොපි වෙන්න ඕන කෝඩ් එක (දැනට SAMPLE-CODE...)
                    buildsHtml += `
                        <div class="loadout-item">
                            <span class="loadout-name">${build}</span>
                            <button class="copy-btn" onclick="copyCode('SAMPLE-CODE-${weapon.title}-${bIdx+1}', this)">Copy Code</button>
                        </div>`;
                });

                let html = `
                    <div class="weapon-group" data-category="${weapon.category}">
                        <div class="weapon-header" onclick="toggleWeapon(this)">
                            <div class="weapon-title">${weapon.title}</div>
                            <div class="arrow">▼</div>
                        </div>
                        <div class="loadout-list">
                            ${buildsHtml}
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // කැටගරි ෆිල්ටර් කරන ෆන්ක්ෂන් එක
        function filterCategory(category, btn) {
            // ඇක්ටිව් බටන් එකේ ස්ටයිල් මාරු කිරීම
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // වෙපන්ස් කාණ්ඩ පෙන්වීම/සැඟවීම
            document.querySelectorAll('.weapon-group').forEach(group => {
                if (category === 'all' || group.getAttribute('data-category') === category) {
                    group.style.display = 'block';
                } else {
                    group.style.display = 'none';
                }
            });
        }

        function toggleWeapon(header) {
            header.classList.toggle('active');
            const list = header.nextElementSibling;
            list.style.display = list.style.display === "block" ? "none" : "block";
        }

        function copyCode(code, button) {
            navigator.clipboard.writeText(code).then(() => {
                button.innerText = "Copied!";
                button.classList.add('copied');
                setTimeout(() => {
                    button.innerText = "Copy Code";
                    button.classList.remove('copied');
                }, 2000);
            });
        }

        // මුලින්ම සයිට් එක ලෝඩ් වෙද්දී රන් කරන්න
        generateWeapons();
    </script>
