<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Force Loadouts - PRiNcE么OPs</title>
    <style>
        :root {
            /* ඔයා එවපු Image එකේ තියෙන Army Green Theme එක */
            --bg-color: #27443f; 
            --card-bg: #1e3531;
            --text-color: #ffffff;
            --accent-color: #ffffff;
            --border-color: #335952;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 50px; }

        /* Header Styles (Image එකේ විදියටම) */
        header {
            text-align: center;
            padding: 60px 20px 30px 20px;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .sub-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 15px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.4;
        }

        .game-name { 
            color: #ffffff; 
            font-size: 2.5rem; 
            font-weight: 800;
            margin-top: 10px;
        }

        /* Container & Cards */
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }

        .weapon-group {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* Weapon Header (Clickable) */
        .weapon-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .weapon-header:hover { background-color: #243f3a; }
        .weapon-header.active { border-bottom: 1px solid var(--border-color); }

        .weapon-title { font-size: 1.6rem; font-weight: bold; color: #ffffff; }
        .arrow { transition: transform 0.3s; font-size: 1.2rem; color: #ffffff; }
        .weapon-header.active .arrow { transform: rotate(180deg); }

        /* Loadout List */
        .loadout-list { display: none; padding: 15px 20px; background-color: #162724; }

        .loadout-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #1e3531;
            gap: 15px;
        }
